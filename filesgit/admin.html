<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Delfín Supermercados</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4ff;color:#1a237e;}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a237e,#1565c0);}
.login-card{background:white;border-radius:20px;padding:40px 36px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,0.2);text-align:center;}
.lc-logo{width:80px;height:80px;background:#f0f4ff;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:6px;}
.lc-logo img{width:100%;object-fit:contain;}
.login-card h2{font-size:20px;font-weight:800;color:#1a237e;margin-bottom:4px;}
.login-card p{font-size:13px;color:#9fa8da;margin-bottom:24px;}
.login-card input{width:100%;border:1.5px solid #e8eaf6;border-radius:10px;padding:12px 14px;font-size:15px;color:#1a237e;outline:none;margin-bottom:14px;font-family:inherit;}
.login-card input:focus{border-color:#1565c0;}
.login-card button{width:100%;background:linear-gradient(135deg,#1a237e,#1565c0);color:white;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
.login-error{color:#e65100;font-size:13px;margin-top:10px;display:none;}
.admin-screen{display:none;}
.adm-header{background:linear-gradient(135deg,#1a237e,#283593);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.adm-left{display:flex;align-items:center;gap:14px;}
.adm-logo{width:50px;height:50px;background:white;border-radius:50%;overflow:hidden;padding:3px;display:flex;align-items:center;justify-content:center;}
.adm-logo img{width:100%;object-fit:contain;}
.adm-header h1{color:white;font-size:18px;font-weight:800;}
.adm-header p{color:#ffb74d;font-size:11px;letter-spacing:1px;text-transform:uppercase;}
.logout-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:inherit;}
.logout-btn:hover{background:rgba(255,255,255,0.25);}
.tabs{background:white;border-bottom:2px solid #e8eaf6;display:flex;padding:0 28px;gap:4px;}
.tab{background:none;border:none;padding:14px 20px;font-size:14px;font-weight:600;color:#9fa8da;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all 0.2s;}
.tab.active{color:#1a237e;border-bottom-color:#e65100;}
.tab:hover{color:#1a237e;}
.adm-main{max-width:960px;margin:0 auto;padding:28px 18px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.section-title{font-size:12px;font-weight:700;color:#e65100;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(to right,#e65100,transparent);}

/* PRODUCTOS */
.prod-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:32px;}
.pec{background:white;border-radius:14px;border:1.5px solid #e8eaf6;padding:16px;box-shadow:0 2px 8px rgba(26,35,126,0.07);}
.pec-img{width:100%;height:140px;background:transparent;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;overflow:hidden;position:relative;}
.pec-img img{max-width:120px;max-height:120px;object-fit:contain;}
.chg-btn{position:absolute;bottom:8px;right:8px;background:#1a237e;color:white;border:none;border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;}
.chg-btn:hover{background:#283593;}
.fl{font-size:11px;font-weight:700;color:#9fa8da;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:block;}
.ei{width:100%;border:1.5px solid #e8eaf6;border-radius:8px;padding:8px 10px;font-size:14px;color:#1a237e;outline:none;font-family:inherit;margin-bottom:10px;}
.ei:focus{border-color:#1565c0;}
.oferta-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.oferta-row label{font-size:13px;color:#3949ab;font-weight:600;cursor:pointer;}
.oferta-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#e65100;}
.save-btn{width:100%;background:linear-gradient(135deg,#e65100,#f57c00);color:white;border:none;border-radius:10px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:6px;}
.save-btn:hover{opacity:0.88;}
.save-btn.saved{background:linear-gradient(135deg,#2e7d32,#43a047);}
.del-btn{width:100%;background:none;border:1.5px solid #ffcdd2;color:#c62828;border-radius:10px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;}
.del-btn:hover{background:#ffebee;}
.add-section{background:white;border-radius:14px;border:1.5px dashed #c5cae9;padding:24px;text-align:center;margin-bottom:32px;}
.add-section h3{color:#3949ab;font-size:16px;font-weight:700;margin-bottom:8px;}
.add-section p{color:#9fa8da;font-size:13px;margin-bottom:16px;}
.add-btn{background:linear-gradient(135deg,#1a237e,#1565c0);color:white;border:none;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;}

/* TEXTOS FIJOS */
.textos-grid{display:flex;flex-direction:column;gap:14px;margin-bottom:28px;}
.texto-card{background:white;border-radius:14px;border:1.5px solid #e8eaf6;padding:18px 20px;box-shadow:0 2px 8px rgba(26,35,126,0.07);}
.texto-card .tl{font-size:11px;font-weight:700;color:#9fa8da;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.texto-input{width:100%;border:1.5px solid #e8eaf6;border-radius:8px;padding:10px 12px;font-size:14px;color:#1a237e;outline:none;font-family:inherit;resize:vertical;min-height:42px;}
.texto-input:focus{border-color:#1565c0;}
.tsave-btn{background:linear-gradient(135deg,#e65100,#f57c00);color:white;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;}
.tsave-btn:hover{opacity:0.88;}
.tsave-btn.saved{background:linear-gradient(135deg,#2e7d32,#43a047);}

/* TEXTOS EXTRA */
.zona-block{background:white;border-radius:14px;border:1.5px solid #e8eaf6;padding:18px 20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(26,35,126,0.07);}
.zona-title{font-size:13px;font-weight:700;color:#1a237e;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.zona-badge{background:#e8eaf6;color:#3949ab;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.extra-item{background:#f5f7ff;border-radius:10px;padding:12px 14px;margin-bottom:10px;border:1px solid #e8eaf6;}
.extra-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.extra-item-label{font-size:12px;font-weight:700;color:#3949ab;}
.extra-item-order{display:flex;gap:4px;}
.order-btn{background:white;border:1.5px solid #e8eaf6;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:#1a237e;}
.order-btn:hover{background:#e8eaf6;}
.extra-textarea{width:100%;border:1.5px solid #e8eaf6;border-radius:8px;padding:8px 10px;font-size:13px;color:#1a237e;outline:none;font-family:inherit;resize:vertical;min-height:38px;background:white;}
.extra-textarea:focus{border-color:#1565c0;}
.extra-actions{display:flex;gap:6px;margin-top:8px;}
.esave-btn{flex:1;background:linear-gradient(135deg,#e65100,#f57c00);color:white;border:none;border-radius:7px;padding:7px;font-size:12px;font-weight:700;cursor:pointer;}
.esave-btn.saved{background:linear-gradient(135deg,#2e7d32,#43a047);}
.edel-btn{background:none;border:1.5px solid #ffcdd2;color:#c62828;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;}
.edel-btn:hover{background:#ffebee;}

.add-extra-card{background:white;border-radius:14px;border:1.5px dashed #c5cae9;padding:20px;margin-bottom:32px;}
.add-extra-card h3{color:#3949ab;font-size:15px;font-weight:700;margin-bottom:14px;}
.add-form{display:flex;flex-direction:column;gap:10px;}
.add-form input, .add-form textarea, .add-form select{border:1.5px solid #e8eaf6;border-radius:8px;padding:9px 12px;font-size:13px;color:#1a237e;outline:none;font-family:inherit;}
.add-form input:focus, .add-form textarea:focus, .add-form select:focus{border-color:#1565c0;}
.add-extra-btn{background:linear-gradient(135deg,#1a237e,#1565c0);color:white;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;align-self:flex-start;}

.stat-card{background:white;border-radius:14px;border:1.5px solid #e8eaf6;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(26,35,126,0.07);}
.stat-card .stat-num{font-size:32px;font-weight:800;color:#1a237e;}
.stat-card .stat-label{font-size:12px;color:#9fa8da;margin-top:4px;}
.stat-card .stat-stars{color:#f57c00;font-size:18px;margin-top:4px;}
.resena-card{background:white;border-radius:14px;border:1.5px solid #e8eaf6;padding:18px 20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(26,35,126,0.07);}
.resena-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.resena-stars{color:#f57c00;font-size:18px;}
.resena-fecha{font-size:11px;color:#9fa8da;}
.resena-aspectos{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.asp-row{background:#f5f7ff;border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;}
.asp-row span{font-size:12px;color:#3949ab;font-weight:600;}
.asp-row .asp-stars{color:#f57c00;font-size:13px;}
.resena-comentario{background:#f5f7ff;border-radius:8px;padding:10px 12px;font-size:13px;color:#1a237e;line-height:1.5;}
.resena-comentario.vacio{color:#9fa8da;font-style:italic;}
.no-resenas{text-align:center;padding:40px;color:#9fa8da;}
.no-resenas .icon{font-size:48px;margin-bottom:12px;}
.gmail-badge{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px;}
.resena-card.con-gmail{border-color:#a5d6a7;border-width:2px;}
.filtro-bar{background:white;border-radius:14px;border:1.5px solid #e8eaf6;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(26,35,126,0.07);}
.filtro-bar label{font-size:12px;font-weight:700;color:#9fa8da;text-transform:uppercase;letter-spacing:1px;}
.filtro-bar input[type=date]{border:1.5px solid #e8eaf6;border-radius:8px;padding:7px 10px;font-size:13px;color:#1a237e;outline:none;font-family:inherit;}
.filtro-bar input[type=date]:focus{border-color:#1565c0;}
.filtro-btn{background:linear-gradient(135deg,#1a237e,#1565c0);color:white;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.filtro-clear{background:none;border:1.5px solid #e8eaf6;color:#9fa8da;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;}
.resena-del-btn{background:none;border:1.5px solid #ffcdd2;color:#c62828;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;}
.resena-del-btn:hover{background:#ffebee;}
.pendiente-badge{background:#fff3e0;color:#e65100;border:1.5px solid #ffb74d;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:8px;}
.respondido-badge{background:#e8f5e9;color:#2e7d32;border:1.5px solid #a5d6a7;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:8px;}
.resena-card.pendiente{border-color:#ffb74d;border-width:2px;background:#fffdf5;}
.resena-card.respondido{border-color:#a5d6a7;border-width:2px;}
.respuesta-box{background:#f5f7ff;border-radius:10px;padding:12px;margin-top:10px;}
.respuesta-box textarea{width:100%;border:1.5px solid #e8eaf6;border-radius:8px;padding:9px 12px;font-size:13px;color:#1a237e;outline:none;font-family:inherit;resize:vertical;min-height:70px;margin-bottom:8px;}
.respuesta-box textarea:focus{border-color:#1565c0;}
.enviar-btn{background:linear-gradient(135deg,#1a237e,#1565c0);color:white;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;}
.enviar-btn:hover{opacity:0.88;}
.enviar-btn:disabled{opacity:0.5;cursor:not-allowed;}
.respuesta-enviada{background:#e8f5e9;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;color:#2e7d32;border-left:3px solid #4caf50;}
.respuesta-enviada strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;opacity:0.7;}
.filtro-estado{display:flex;gap:6px;}
.fest-btn{background:white;border:1.5px solid #e8eaf6;color:#9fa8da;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.fest-btn.active{background:#1a237e;color:white;border-color:#1a237e;}
.no-resenas .icon{font-size:48px;margin-bottom:12px;}
.noticia-admin-card{background:white;border-radius:14px;border:1.5px solid #e8eaf6;padding:16px 20px;box-shadow:0 2px 8px rgba(26,35,126,0.07);}
.noticia-admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.noticia-admin-title{font-size:15px;font-weight:700;color:#1a237e;display:flex;align-items:center;gap:8px;}
.noticia-admin-fecha{font-size:11px;color:#9fa8da;}
.noticia-admin-texto{font-size:13px;color:#546e7a;line-height:1.5;margin-bottom:12px;}
.auto-textarea{width:100%;border:1.5px solid #e8eaf6;border-radius:8px;padding:10px 12px;font-size:14px;color:#1a237e;outline:none;font-family:inherit;resize:none;overflow:hidden;min-height:60px;line-height:1.6;}
.auto-textarea:focus{border-color:#1565c0;}
.somos-card{background:white;border-radius:14px;border:1.5px solid #e8eaf6;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(26,35,126,0.07);}
.somos-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.somos-card-title{font-size:15px;font-weight:700;color:#1a237e;display:flex;align-items:center;gap:8px;}
.toast{position:fixed;bottom:24px;right:24px;background:#2e7d32;color:white;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0OkVe2TyZUkLn9APMHpwAiE0UnmHRsqY",
  authDomain: "delfin-supermercado.firebaseapp.com",
  projectId: "delfin-supermercado",
  storageBucket: "delfin-supermercado.firebasestorage.app",
  messagingSenderId: "530567833948",
  appId: "1:530567833948:web:d5b099a6acdcf5aa7a3999"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const PASS = "delfin2024";
let productos = [];
let textos = [];
let pendingImgs = {};

const DEFAULT_TEXTOS = [
  { id:"txt_nombre",    label:"Nombre del super",         value:"Delfín Supermercados" },
  { id:"txt_slogan",    label:"Slogan bajo el nombre",    value:"Precios de la semana" },
  { id:"txt_direccion", label:"Dirección",                value:"Calle Rivadavia s/n" },
  { id:"txt_horario",   label:"Horario",                  value:"8:30–12:30 | 16:30–20:30" },
  { id:"txt_oferta",    label:"Barra de ofertas",         value:"🔥 OFERTAS DE LA SEMANA — precios válidos hasta el domingo" },
  { id:"txt_footer",    label:"Pie de página",            value:"Delfín Supermercados · Calle Rivadavia s/n · Lun–Sáb 8:30–12:30 y 16:30–20:30" },
  { id:"txt_nota",      label:"Nota de precios",          value:"Precios orientativos. Ofertas válidas hasta el domingo o hasta agotar stock." },
  { id:"txt_fb_titulo", label:"Título sección opiniones", value:"¿Cómo fue tu visita?" },
  { id:"txt_fb_desc",   label:"Descripción opiniones",    value:"Tu opinión nos ayuda a mejorar cada día. Contanos tu experiencia en el local y con la atención." },
  { id:"txt_fb_priv",   label:"Nota de privacidad",       value:"🔒 Tu opinión es privada y solo la ve el equipo de Delfín Supermercados. No se publica ni se comparte." },
];

window.doLogin = function() {
  if (document.getElementById('pwd-input').value === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    startListening();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
};
window.doLogout = function() {
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
};
window.showTab = function(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
};
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function startListening() {
  const texSnap = await getDocs(collection(db, "textos"));
  if (texSnap.empty) {
    for (const t of DEFAULT_TEXTOS) await setDoc(doc(db, "textos", t.id), t);
  }
  onSnapshot(collection(db, "productos"), snap => {
    productos = snap.docs.map(d => d.data());
    renderProducts();
  });
  onSnapshot(collection(db, "textos"), snap => {
    textos = snap.docs.map(d => d.data());
    renderTextos();
  });


  onSnapshot(collection(db, "feedback"), snap => {
    const resenas = snap.docs.map(d => ({...d.data(), _docId: d.id})).sort((a,b) => b.fecha > a.fecha ? 1 : -1);
    renderResenas(resenas);
  });

  onSnapshot(collection(db, "noticias"), snap => {
    const noticias = snap.docs.map(d => ({...d.data(), _docId: d.id})).sort((a,b) => b.fecha > a.fecha ? 1 : -1);
    renderNoticiasAdmin(noticias);
  });

  const somosSnap = await getDocs(collection(db, "somos"));
  if (somosSnap.empty) {
    const defaults = [
      {id:'somos_1', emoji:'🎯', titulo:'Misión', texto:'Brindar a nuestros clientes productos de calidad a precios accesibles, con una atención cálida y personalizada que haga de cada visita una experiencia agradable.', orden:1},
      {id:'somos_2', emoji:'🌟', titulo:'Visión', texto:'Ser el supermercado de referencia en nuestra comunidad, reconocidos por nuestra honestidad, variedad de productos y el compromiso con el vecino de cada día.', orden:2},
      {id:'somos_3', emoji:'📖', titulo:'Nuestra historia', texto:'Delfín Supermercados nació con el sueño de ofrecer a nuestra comunidad un lugar donde hacer las compras sea fácil, accesible y con la calidez de siempre. Con los años fuimos creciendo de la mano de nuestros clientes, incorporando nuevos productos y mejorando nuestros servicios sin perder nunca la esencia de un negocio familiar comprometido con el barrio.', orden:3},
    ];
    for (const b of defaults) await setDoc(doc(db, "somos", b.id), b);
  }

  // Cargar somos con getDocs para no re-renderizar al guardar
  const somosData = await getDocs(collection(db, "somos"));
  const bloquesCargados = somosData.docs.map(d => ({...d.data(), _docId: d.id})).sort((a,b) => (a.orden||0)-(b.orden||0));
  renderSomosAdmin(bloquesCargados);
}

// ── PRODUCTOS ──
function renderProducts() {
  const list = document.getElementById('prod-list');
  list.innerHTML = '';
  productos.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pec';
    card.innerHTML = `
      <div class="pec-img">
        <img id="img-${p.id}" src="${p.img}" alt="${p.nombre}">
        <button class="chg-btn" onclick="document.getElementById('file-${p.id}').click()">📷 Cambiar foto</button>
        <input type="file" id="file-${p.id}" style="display:none" accept="image/*" onchange="handleImg(event,'${p.id}')">
      </div>
      <span class="fl">Nombre</span><input class="ei" id="nom-${p.id}" value="${p.nombre}">
      <span class="fl">Precio ($)</span><input class="ei" id="pre-${p.id}" value="${p.precio}">
      <span class="fl">Categoría</span>
      <select class="ei" id="cat-${p.id}" style="cursor:pointer;" onchange="toggleNuevaCat('${p.id}',this)">
        <option value="Carnicería" ${p.categoria==='Carnicería'?'selected':''}>🥩 Carnicería</option>
        <option value="Verdulería" ${p.categoria==='Verdulería'?'selected':''}>🥦 Verdulería</option>
        <option value="Bebidas sin alcohol" ${p.categoria==='Bebidas sin alcohol'?'selected':''}>🧃 Bebidas sin alcohol</option>
        <option value="Bebidas con alcohol" ${p.categoria==='Bebidas con alcohol'?'selected':''}>🍺 Bebidas con alcohol</option>
        <option value="Limpieza" ${p.categoria==='Limpieza'?'selected':''}>🧴 Limpieza</option>
        <option value="Fiambres y lácteos" ${p.categoria==='Fiambres y lácteos'?'selected':''}>🧀 Fiambres y lácteos</option>
        <option value="No perecederos" ${p.categoria==='No perecederos'?'selected':''}>🥫 No perecederos</option>
        <option value="__nueva__">➕ Agregar categoría nueva...</option>
      </select>
      <div id="nueva-cat-${p.id}" style="display:none;margin-top:8px;background:#f5f7ff;border-radius:8px;padding:10px;border:1.5px solid #e8eaf6;">
        <span style="font-size:11px;font-weight:700;color:#9fa8da;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;">Nueva categoría</span>
        <div style="display:flex;gap:8px;">
          <input class="ei" id="nueva-cat-emoji-${p.id}" placeholder="Emoji" style="width:70px;margin-bottom:0;">
          <input class="ei" id="nueva-cat-nombre-${p.id}" placeholder="Nombre" style="flex:1;margin-bottom:0;">
        </div>
      </div>
      <div class="oferta-row">
        <input type="checkbox" id="ofe-${p.id}" ${p.oferta?'checked':''}>
        <label for="ofe-${p.id}">Es una oferta</label>
      </div>
      <div class="oferta-row">
        <input type="checkbox" id="car-${p.id}" ${p.carrusel?'checked':''}>
        <label for="car-${p.id}">⭐ Destacar en carrusel</label>
      </div>
      <button class="save-btn" id="sbtn-${p.id}" onclick="saveProduct('${p.id}')">Guardar cambios</button>
      <button class="del-btn" onclick="deleteProduct('${p.id}','${p.nombre}')">Eliminar producto</button>`;
    list.appendChild(card);
  });
}
window.handleImg = function(event, id) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { document.getElementById('img-'+id).src = e.target.result; pendingImgs[id] = e.target.result; };
  reader.readAsDataURL(file);
};
window.saveProduct = async function(id) {
  const btn = document.getElementById('sbtn-'+id);

function aplicarTodosFiltros() {
  const desde = document.getElementById('filtro-desde').value;
  const hasta = document.getElementById('filtro-hasta').value;
  let filtradas = todasResenas;
  if (desde) filtradas = filtradas.filter(r => r.fecha && r.fecha >= desde);
  if (hasta) filtradas = filtradas.filter(r => r.fecha && r.fecha <= hasta + ' 23:59');
  if (estadoFiltro === 'pendiente') filtradas = filtradas.filter(r => r.gmail && !r.respondido);
  if (estadoFiltro === 'respondido') filtradas = filtradas.filter(r => r.respondido);
  mostrarResenas(filtradas);
}

function mostrarResenas(resenas) {
  const stats = document.getElementById('resenas-stats');
  const list  = document.getElementById('resenas-list');
  const count = document.getElementById('filtro-count');
  if (!stats || !list) return;

  if (count) count.textContent = resenas.length + ' reseña' + (resenas.length !== 1 ? 's' : '');

  if (!resenas.length) {
    stats.innerHTML = '';
    list.innerHTML = '<div class="no-resenas"><div class="icon">💬</div><p>No hay reseñas en este período</p></div>';
    return;
  }

  // Ordenar: pendientes arriba, respondidas abajo por fecha
  const pendientes  = resenas.filter(r => r.gmail && !r.respondido);
  const respondidas = resenas.filter(r => r.respondido);
  const sinGmail    = resenas.filter(r => !r.gmail);
  const ordenadas   = [...pendientes, ...sinGmail, ...respondidas];

  const total = resenas.length;
  const promedio = (resenas.reduce((s,r) => s + r.general, 0) / total).toFixed(1);
  const aspectos = ['atencion','precios','limpieza','variedad'];
  const labels = {atencion:'Atención',precios:'Precios',limpieza:'Limpieza',variedad:'Variedad'};
  const conGmail = resenas.filter(r => r.gmail).length;
  const pendientesCount = pendientes.length;

  let statsHtml = `
    <div class="stat-card">
      <div class="stat-num">${total}</div>
      <div class="stat-label">Reseñas totales</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${promedio}</div>
      <div class="stat-stars">${'★'.repeat(Math.round(promedio))}${'☆'.repeat(5-Math.round(promedio))}</div>
      <div class="stat-label">Promedio general</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#e65100;">${pendientesCount}</div>
      <div class="stat-label">Pendientes de respuesta</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${conGmail}</div>
      <div class="stat-label">Con Gmail</div>
    </div>`;

  aspectos.forEach(asp => {
    const conAsp = resenas.filter(r => r.aspectos && r.aspectos[asp] > 0);
    const prom = conAsp.length ? (conAsp.reduce((s,r) => s + r.aspectos[asp], 0) / conAsp.length).toFixed(1) : '-';
    statsHtml += `
      <div class="stat-card">
        <div class="stat-num">${prom}</div>
        <div class="stat-stars">${prom !== '-' ? '★'.repeat(Math.round(prom))+'☆'.repeat(5-Math.round(prom)) : '—'}</div>
        <div class="stat-label">${labels[asp]}</div>
      </div>`;
  });
  stats.innerHTML = statsHtml;

  list.innerHTML = '';
  ordenadas.forEach((r, idx) => {
    const id = r._docId || r.id || ('resena_' + idx);
    const esPendiente = r.gmail && !r.respondido;
    const esRespondido = r.respondido;
    const card = document.createElement('div');
    card.className = 'resena-card' + (esPendiente ? ' pendiente' : '') + (esRespondido ? ' respondido' : '');
    const estrellas = '★'.repeat(r.general) + '☆'.repeat(5 - r.general);
    const aspHtml = r.aspectos ? Object.entries({atencion:'👋 Atención',precios:'💲 Precios',limpieza:'🧹 Limpieza',variedad:'🛍️ Variedad'}).map(([k,lbl]) => {
      const v = r.aspectos[k] || 0;
      return `<div class="asp-row"><span>${lbl}</span><span class="asp-stars">${v ? '★'.repeat(v)+'☆'.repeat(5-v) : '—'}</span></div>`;
    }).join('') : '';

    const badgeHtml = esPendiente
      ? `<div class="pendiente-badge">⏳ Pendiente de respuesta</div>`
      : esRespondido
        ? `<div class="respondido-badge">✅ Respondido</div>`
        : '';

    const respuestaHtml = esPendiente ? `
      <div class="respuesta-box">
        <textarea id="resp-${id}" placeholder="Escribí tu respuesta para ${r.gmail}..."></textarea>
        <button class="enviar-btn" id="envbtn-${id}" onclick="enviarRespuesta('${id}','${r.gmail}')">✉️ Enviar respuesta</button>
      </div>` : esRespondido ? `
      <div class="respuesta-enviada">
        <strong>Respuesta enviada</strong>
        ${r.respuesta || ''}
      </div>` : '';

    card.innerHTML = `
      <div class="resena-header">
        <div class="resena-stars" style="font-size:22px;">${estrellas}</div>
        <div class="resena-fecha">${r.fecha || ''}</div>
      </div>
      ${badgeHtml}
      ${r.gmail ? `<div class="gmail-badge">✉️ ${r.gmail}</div>` : ''}
      ${aspHtml ? '<div class="resena-aspectos">' + aspHtml + '</div>' : ''}
      <div class="resena-comentario ${!r.comentario ? 'vacio' : ''}">${r.comentario || 'Sin comentario'}</div>
      ${respuestaHtml}
      <button class="resena-del-btn" onclick="eliminarResena('${id}')">🗑️ Eliminar reseña</button>`;
    list.appendChild(card);
  });
}

window.saveSomos = async function(id) {
  const btn = document.getElementById('s-btn-' + id);
  const prevText = btn.textContent;
  btn.textContent = 'Guardando...'; btn.disabled = true;
  try {
    const cached = somosCache.find(b => b._docId === id) || {};
    const bloque = {
      id,
      emoji:  document.getElementById('s-emoji-' + id).value.trim(),
      titulo: document.getElementById('s-titulo-' + id).value.trim(),
      texto:  document.getElementById('s-texto-' + id).value.trim(),
      orden:  cached.orden || Date.now()
    };
    await setDoc(doc(db, "somos", id), bloque);
    // Actualizar cache sin re-renderizar
    const idx = somosCache.findIndex(b => b._docId === id);
    if (idx >= 0) somosCache[idx] = {...somosCache[idx], ...bloque};
    btn.textContent = '✅ Guardado'; btn.classList.add('saved');
    showToast('✅ ' + (bloque.titulo || 'Bloque') + ' guardado');
    setTimeout(() => { btn.textContent = prevText; btn.classList.remove('saved'); btn.disabled = false; }, 2000);
  } catch(e) {
    console.error(e);
    btn.textContent = prevText; btn.disabled = false;
    showToast('❌ Error: ' + e.message);
  }
};

window.deleteSomos = async function(id, titulo) {
  if (!confirm('¿Eliminar "' + titulo + '"?')) return;

  somosCache = somosCache.filter(b => b._docId !== id);

// Modificar saveProduct para manejar categoría nueva
const _origSaveProduct = window.saveProduct;
window.saveProduct = async function(id) {
  const select = document.getElementById('cat-' + id);
  if (select && select.value === '__nueva__') {
    const emoji  = document.getElementById('nueva-cat-emoji-' + id) ? document.getElementById('nueva-cat-emoji-' + id).value.trim() || '📦' : '📦';
    const nombre = document.getElementById('nueva-cat-nombre-' + id) ? document.getElementById('nueva-cat-nombre-' + id).value.trim() : '';
    if (!nombre) { alert('Escribí el nombre de la nueva categoría.'); return; }
    const catFinal = nombre;
    const opt = document.createElement('option');
    opt.value = catFinal;
    opt.textContent = emoji + ' ' + catFinal;
    opt.selected = true;
    select.insertBefore(opt, select.lastElementChild);
    select.value = catFinal;
    const div = document.getElementById('nueva-cat-' + id);
    if (div) div.style.display = 'none';
  }
  await _origSaveProduct(id);
};
